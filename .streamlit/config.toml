[client]
toolbarMode = "auto"

[server]
fileWatcherType = "none"

[theme]
base = "light"
font = "sans serif"
baseRadius = "large"
buttonRadius = "large"
showWidgetBorder = true

[theme.light]
primaryColor = "#1d4ed8"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
borderColor = "#cbd5e1"

[theme.light.sidebar]
secondaryBackgroundColor = "#eef2ff"
textColor = "#0f172a"
borderColor = "#c7d2fe"

[theme.dark]
primaryColor = "#3b82f6"
backgroundColor = "#0b1220"
secondaryBackgroundColor = "#111827"
textColor = "#e5e7eb"
borderColor = "#334155"

[theme.dark.sidebar]
secondaryBackgroundColor = "#0f172a"
textColor = "#e5e7eb"
borderColor = "#334155"

