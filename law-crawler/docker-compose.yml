services:
    law-mysql:
        image: mysql:8.0
        ports:
            - 3306:3306
        environment:
            MYSQL_ROOT_PASSWORD: 123456789
            MYSQL_DATABASE: law
            MYSQL_PASSWORD: 123456789
        networks:
            - app-network

    phpmyadmin:
        image: phpmyadmin:latest
        platform: linux/amd64
        restart: always
        ports:
            - 8081:80
        depends_on:
            - law-mysql
        networks:
            - app-network
        environment:
            PMA_HOST: law-mysql
            UPLOAD_LIMIT: 300M
networks:
    app-network:
        driver: bridge
