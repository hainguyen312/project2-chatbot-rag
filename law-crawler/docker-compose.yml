services:
    law-mysql:
        image: mysql:8.0
        ports:
            - 3306:3306
        environment:
            MYSQL_ROOT_PASSWORD: 123456789
            MYSQL_DATABASE: law
            MYSQL_USER: law_user
            MYSQL_PASSWORD: 123456789
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456789"]
            interval: 5s
            timeout: 3s
            retries: 20
        networks:
            - app-network

    phpmyadmin:
        image: phpmyadmin
        restart: always
        ports:
            - 8081:80
        depends_on:
            - law-mysql
        networks:
            - app-network
        environment:
            PMA_HOST: law-mysql
            UPLOAD_LIMIT: 300M
networks:
    app-network:
        driver: bridge
